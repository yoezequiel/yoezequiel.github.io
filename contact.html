<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio - Contacto</title>
    <link rel="stylesheet" href="static/css/styles.css">
    <link rel="shortcut icon" href="/img/channels4_profile-removebg-preview.png" />
    <link rel="shortcut icon" href="/img/logo.png" />
</head>

<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html" class="nav-link">Inicio</a></li>
                <li><a href="about.html" class="nav-link">Sobre mí</a></li>
                <li><a href="projects.html" class="nav-link">Proyectos</a></li>
                <li><a href="skills.html" class="nav-link">Habilidades</a></li>
                <li><a href="contact.html" class="nav-link">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="contact" class="bg-light py-5">
            <div class="container">
                <div class="row">
                    <div class="col-lg-8 mx-auto text-center">
                        <h2 class="text-primary mb-4">Contacto</h2>
                        <form id="contactForm" action="" method="post">
                            <div class="form-group">
                                <label for="name">Nombre:</label>
                                <input type="text" class="form-control" id="name" name="name" required>
                            </div>
                            <div class="form-group">
                                <label for="email">Correo electrónico:</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>
                            <div class="form-group">
                                <label for="message">Mensaje:</label>
                                <textarea class="form-control" id="message" name="message" rows="5" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block mt-4">Enviar mensaje</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

</body>

</html>
